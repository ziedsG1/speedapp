name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Expo iOS project
        env:
          CI: "true"
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned IPA
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/SpeedApp.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          APP_PATH=$(find "$RUNNER_TEMP/SpeedApp.xcarchive/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          echo "App bundle contents:"
          ls -la "$APP_PATH"

          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr SpeedApp-unsigned.ipa Payload
          ls -lh SpeedApp-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeedApp-ipa
          path: ${{ runner.temp }}/SpeedApp-unsigned.ipa
          retention-days: 30
