name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-ipa:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26
        run: |
          echo "Available Xcode installs:"
          ls /Applications | grep Xcode || true
          for x in Xcode_26.4.app Xcode_26.5.app Xcode_26.2.app Xcode_26.4.1.app; do
            if [ -d "/Applications/$x" ]; then
              echo "Selecting /Applications/$x"
              sudo xcode-select --switch "/Applications/$x"
              break
            fi
          done
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Expo iOS project
        env:
          CI: "true"
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned IPA
        run: |
          set -eo pipefail

          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)

          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" -list

          DERIVED="$RUNNER_TEMP/DerivedData"
          LOG="$RUNNER_TEMP/xcodebuild.log"
          rm -rf "$DERIVED"

          if ! xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$DERIVED" \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee "$LOG"; then
            echo "=== xcodebuild failed — last 200 lines ==="
            tail -200 "$LOG" || true
            exit 1
          fi

          PRODUCTS="$DERIVED/Build/Products/Release-iphoneos"
          echo "=== Products directory ==="
          ls -la "$PRODUCTS" || true

          APP_PATH="$PRODUCTS/${SCHEME}.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find "$PRODUCTS" -maxdepth 1 -type d -name "*.app" | head -1 || true)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Could not find .app bundle"
            find "$DERIVED/Build/Products" -type d -name "*.app" || true
            exit 1
          fi

          echo "=== App bundle: $APP_PATH ==="
          ls -la "$APP_PATH"

          rm -rf "$RUNNER_TEMP/Payload" "$RUNNER_TEMP/SpeedApp-unsigned.ipa"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr SpeedApp-unsigned.ipa Payload
          ls -lh SpeedApp-unsigned.ipa

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: SpeedApp-ipa
          path: ${{ runner.temp }}/SpeedApp-unsigned.ipa
          retention-days: 30
